version: '3.8'

services:
  agent-flow:
    build: .
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - agent-data:/app/data
    restart: unless-stopped

volumes:
  agent-data:
